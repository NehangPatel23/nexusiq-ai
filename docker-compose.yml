services:
  db:
    image: pgvector/pgvector:pg16
    container_name: nexusiq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexusiq
      POSTGRES_PASSWORD: nexusiq
      POSTGRES_DB: nexusiq
    ports:
      # 5433 avoids conflict with a local PostgreSQL on 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusiq -d nexusiq"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
